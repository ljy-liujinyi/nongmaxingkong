<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农技百科 · 识万物 · 知农事</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(145deg, #f0f7e8 0%, #e6f0da 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        .app-header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(76,175,80,0.2);
            padding: 18px 0 12px;
            margin-bottom: 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .logo-icon { font-size: 2.4rem; }
        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1b5e20 0%, #4caf50 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub-head {
            text-align: center;
            color: #2e7d32;
            font-weight: 500;
            font-size: 0.95rem;
            opacity: 0.8;
            margin-top: 4px;
        }
        .mode-selector {
            background: white;
            border-radius: 50px;
            padding: 4px;
            display: inline-flex;
            margin: 0 auto 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .mode-btn {
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: #666;
        }
        .mode-btn.active {
            background: #2e7d32;
            color: white;
        }
        .main-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.05);
            padding: 24px 20px;
            margin-bottom: 24px;
        }
        .upload-area {
            background: #f9fff9;
            border: 2px dashed #81c784;
            border-radius: 28px;
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
        }
        .upload-icon { font-size: 4rem; display: block; margin-bottom: 10px; }
        .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0 8px;
        }
        .btn-custom {
            border-radius: 50px;
            padding: 12px 28px;
            font-weight: 600;
            border: 1px solid #c5e0b4;
            background: #f0fae6;
            color: #1f4a22;
        }
        .btn-custom-primary {
            background: #2e7d32;
            color: white;
            border: none;
        }
        .preview-box {
            background: #f9fdf2;
            border-radius: 28px;
            padding: 24px 20px;
        }
        .preview-img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .result-card {
            border-radius: 28px;
            padding: 24px 22px;
            margin-top: 30px;
            border-left: 8px solid;
            background: white;
        }
        .disease-card { border-left-color: #e67e22; }
        .food-card { border-left-color: #2e7d32; }
        .confidence-chip {
            background: #eaf7e1;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
        }
        .disease-selector {
            background: #f8fbf4;
            border-radius: 22px;
            padding: 18px;
            margin: 20px 0;
        }
        .disease-option {
            background: white;
            border: 1px solid #e0f0d8;
            border-radius: 16px;
            padding: 12px 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .disease-option:hover {
            background: #f0fae6;
            transform: translateX(5px);
            border-color: #4caf50;
        }
        .disease-option h5 { color: #b94a0b; margin-bottom: 5px; }
        .badge-collection {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }
        .badge-crop {
            background: #eaf2e3;
            color: #194d1e;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            border: 1px solid #bcddb0;
            cursor: pointer;
        }
        .loading-spinner {
            width: 3.5rem;
            height: 3.5rem;
            border: 5px solid #e2f0da;
            border-top: 5px solid #2e7d32;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 18px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-header">
    <div class="container">
        <div class="logo">
            <span class="logo-icon">🌱</span>
            <span class="logo-text">农技百科</span>
        </div>
        <div class="sub-head">识万物 · 知农事 · 懂健康</div>
    </div>
</div>

<div class="container" style="max-width: 680px;">
    <!-- 模式切换 -->
    <div style="display: flex; justify-content: center; margin-bottom: 20px;">
        <div class="mode-selector">
            <button class="mode-btn active" id="foodModeBtn">🍎 识别食材</button>
            <button class="mode-btn" id="diseaseModeBtn">⚠️ 识别病害</button>
        </div>
    </div>

    <!-- 主卡片 -->
    <div class="main-card">
        <!-- 上传区 -->
        <div class="upload-area" id="uploadArea">
            <span class="upload-icon">📸</span>
            <h5 class="fw-bold" style="color:#1d4e1f;">点击上传或拍照</h5>
            <p class="text-secondary small">识别农作物 / 病害 / 食材</p>
            <input type="file" id="imageInput" accept="image/*" capture="environment" style="display: none;">
            <div class="btn-row">
                <button class="btn-custom" id="selectBtn">📁 选择图片</button>
                <button class="btn-custom btn-custom-primary" id="cameraBtn">📷 拍照识别</button>
            </div>
        </div>

        <!-- 预览区域 -->
        <div id="previewContainer" style="display: none;" class="preview-box text-center">
            <img id="previewImage" class="preview-img mb-3" alt="预览图">
            <div class="d-flex gap-2 justify-content-center">
                <button class="btn-custom" id="changeImageBtn">↺ 重新选择</button>
            </div>
        </div>

        <!-- 加载动画 -->
        <div id="loading" style="display: none;" class="text-center py-5">
            <div class="loading-spinner"></div>
            <p class="fw-semibold fs-5" style="color: #1e4a22;">AI 识别中...</p>
            <p class="small text-secondary">请稍候几秒</p>
        </div>

        <!-- 结果容器 -->
        <div id="resultContainer"></div>
    </div>

    <!-- 快捷标签 -->
    <div style="margin: 24px 0 20px;">
        <p class="small text-secondary">点击标签复制名称，到百度搜图下载图片测试</p>
        <div class="badge-collection">
            <span class="badge-crop" data-crop="苹果">🍎 苹果</span>
            <span class="badge-crop" data-crop="番茄">🍅 番茄</span>
            <span class="badge-crop" data-crop="黄瓜">🥒 黄瓜</span>
            <span class="badge-crop" data-crop="草莓">🍓 草莓</span>
            <span class="badge-crop" data-crop="水稻">🌾 水稻</span>
            <span class="badge-crop" data-crop="玉米">🌽 玉米</span>
            <span class="badge-crop" data-crop="白粉病">⚠️ 白粉病</span>
            <span class="badge-crop" data-crop="霜霉病">⚠️ 霜霉病</span>
            <span class="badge-crop" data-crop="早疫病">⚠️ 早疫病</span>
        </div>
    </div>
</div>

<script>
    const uploadArea = document.getElementById('uploadArea');
    const imageInput = document.getElementById('imageInput');
    const selectBtn = document.getElementById('selectBtn');
    const cameraBtn = document.getElementById('cameraBtn');
    const previewContainer = document.getElementById('previewContainer');
    const previewImage = document.getElementById('previewImage');
    const changeImageBtn = document.getElementById('changeImageBtn');
    const loading = document.getElementById('loading');
    const resultContainer = document.getElementById('resultContainer');
    const foodModeBtn = document.getElementById('foodModeBtn');
    const diseaseModeBtn = document.getElementById('diseaseModeBtn');

    let currentMode = 'food';
    let currentDiseaseList = [];

    foodModeBtn.addEventListener('click', () => {
        currentMode = 'food';
        foodModeBtn.classList.add('active');
        diseaseModeBtn.classList.remove('active');
    });

    diseaseModeBtn.addEventListener('click', () => {
        currentMode = 'disease';
        diseaseModeBtn.classList.add('active');
        foodModeBtn.classList.remove('active');
    });

    selectBtn.addEventListener('click', () => {
        imageInput.removeAttribute('capture');
        imageInput.click();
    });

    cameraBtn.addEventListener('click', () => {
        imageInput.setAttribute('capture', 'environment');
        imageInput.click();
    });

    uploadArea.addEventListener('click', () => {
        imageInput.removeAttribute('capture');
        imageInput.click();
    });

    imageInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            previewImage.src = ev.target.result;
            uploadArea.style.display = 'none';
            previewContainer.style.display = 'block';
            resultContainer.innerHTML = '';
        };
        reader.readAsDataURL(file);
        uploadImage(file);
    });

    changeImageBtn.addEventListener('click', () => {
        previewContainer.style.display = 'none';
        uploadArea.style.display = 'block';
        resultContainer.innerHTML = '';
        imageInput.value = '';
    });

    async function uploadImage(file) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('mode', currentMode);

        loading.style.display = 'block';
        resultContainer.innerHTML = '';

        try {
            const response = await fetch('/identify', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            loading.style.display = 'none';

            if (data.error) {
                showError(data.error);
                return;
            }

            if (data.crop_info.type === 'disease_select') {
                showDiseaseSelect(data);
            } else {
                showResult(data);
            }
        } catch (err) {
            loading.style.display = 'none';
            showError('网络错误，请重试');
        }
    }

    function showDiseaseSelect(data) {
        const info = data.crop_info;
        const cropName = info.crop;
        const diseases = info.possible_diseases || [];

        let html = `
            <div class="result-card">
                <h4>🌾 识别到作物：${cropName}</h4>
                <p class="text-muted">请选择具体的病害类型：</p>
                <div class="disease-selector">
        `;

        diseases.forEach(d => {
            html += `
                <div class="disease-option" onclick="getDiseaseInfo('${d.name}')">
                    <h5>⚠️ ${d.name}</h5>
                    <p class="small text-muted">${d.symptoms}</p>
                    <p class="small text-success">受害作物：${d.crop}</p>
                </div>
            `;
        });

        html += `</div></div>`;
        resultContainer.innerHTML = html;
    }

    window.getDiseaseInfo = async function(diseaseName) {
        loading.style.display = 'block';
        try {
            const response = await fetch('/get_disease_info', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({disease_name: diseaseName})
            });
            const data = await response.json();
            loading.style.display = 'none';

            if (data.error) {
                alert(data.error);
                return;
            }

            data.type = 'disease';
            showResult({crop_info: data});
        } catch (err) {
            loading.style.display = 'none';
            alert('获取病害信息失败');
        }
    };

    function showResult(data) {
        const info = data.crop_info || {};
        const isDisease = info.type === 'disease';
        const name = data.recognized_name || '未知';

        let html = `<div class="result-card ${isDisease ? 'disease-card' : 'food-card'}">`;
        html += `<h3>${name} ${isDisease ? '<span class="disease-chip">病害</span>' : ''}</h3>`;

        if (isDisease) {
            html += `
                <div class="mt-3">
                    <p><strong>受害作物：</strong>${info.crop || '未知'}</p>
                    <p><strong>症状特征：</strong>${info.symptoms || '无'}</p>
                    <p><strong>防治建议：</strong>${info.treatment || '无'}</p>
                    <p><strong>预防措施：</strong>${info.prevention || '无'}</p>
                </div>
            `;
        } else {
            html += `
                <div class="mt-3">
                    <p><strong>科学名：</strong>${info.科学名 || '未知'}</p>
                    <p><strong>营养价值：</strong>${info.营养价值 || '无'}</p>
                    <p><strong>挑选方法：</strong>${info.挑选方法 || '无'}</p>
                    <p><strong>食用建议：</strong>${info.食用建议 || '无'}</p>
                </div>
            `;
        }

        html += `</div>`;
        resultContainer.innerHTML = html;
    }

    function showError(msg) {
        resultContainer.innerHTML = `
            <div class="result-card" style="border-left-color:#d32f2f;">
                <h5 class="text-danger">❌ 识别失败</h5>
                <p>${msg}</p>
            </div>
        `;
    }

    // 标签复制
    document.querySelectorAll('.badge-crop').forEach(tag => {
        tag.addEventListener('click', () => {
            const text = tag.textContent.trim();
            navigator.clipboard.writeText(text.replace(/[🍎🍅🥒🍓🌾🌽⚠️]/g, '').trim());
            alert('已复制: ' + text);
        });
    });
</script>
</body>
</html>
